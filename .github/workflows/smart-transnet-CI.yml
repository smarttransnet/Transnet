name: SmartTransNet-Docker-CI
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build the Docker image
      run: |
        docker build . --file src/Web.Api/Dockerfile \
          --tag 808765744383.dkr.ecr.ap-southeast-1.amazonaws.com/smarttransnet/transnet-api:latest \
          --tag 808765744383.dkr.ecr.ap-southeast-1.amazonaws.com/smarttransnet/transnet-api:${{ github.sha }}

    - name: Push the Docker image
      run: |
        docker push 808765744383.dkr.ecr.ap-southeast-1.amazonaws.com/smarttransnet/transnet-api:latest
        docker push 808765744383.dkr.ecr.ap-southeast-1.amazonaws.com/smarttransnet/transnet-api:${{ github.sha }}

    - name: Deploy to Amazon ECS Fargate
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --service ${{ secrets.ECS_SERVICE_NAME }} \
          --force-new-deployment \
          --region ap-southeast-1
